<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Stay@Maredumilli</title>
  <meta name="description" content="Secure Stay@Maredumilli admin and hotel owner login.">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css?v=custom-domain">
  <link rel="manifest" href="manifest.json">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: #fbfbf8; display: grid; place-items: center; min-height: 100vh; margin: 0;">
  <div class="login-card" style="box-shadow: 0 20px 40px rgba(0,0,0,0.06); border-radius: 12px; background: #fff; border: 1px solid var(--border);">
    <div class="login-header">
      <div class="login-title">
        <img class="brand-logo" src="/brand-logo.png" alt="" aria-hidden="true">
        <h2>Stay@Maredumilli</h2>
      </div>
      <p>Sign in to manage your portal</p>
    </div>
    
    <div id="loginStatus" class="login-status-alert hidden"></div>

    <form id="unifiedLoginForm" class="login-fields">
      <div class="form-group">
        <label>Account Type</label>
        <div style="display: flex; gap: 20px; margin-top: 6px;">
          <label style="display: inline-flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; color: var(--text);">
            <input type="radio" name="accountType" value="owner" checked style="width: auto; margin: 0; cursor: pointer;"> Hotel Owner
          </label>
          <label style="display: inline-flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; color: var(--text);">
            <input type="radio" name="accountType" value="admin" style="width: auto; margin: 0; cursor: pointer;"> Super Admin
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input id="loginEmail" type="email" required placeholder="name@domain.com" autocomplete="username">
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" required placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="primary-btn login-submit-btn" type="submit" style="background: var(--accent); color: #fff; font-weight: 700; border-radius: 8px; height: 42px; margin-top: 8px;">Sign In</button>
    </form>
    <button id="pwaInstallBtn" class="ghost-btn" type="button" style="display: none; align-items: center; justify-content: center; gap: 6px; width: 100%; margin-top: 12px; border-color: rgba(0,0,0,0.1);"><i data-lucide="download"></i> Install App on Home Screen</button>
  </div>

  <script>
    if (window.lucide) lucide.createIcons();

    const form = document.querySelector("#unifiedLoginForm");
    const statusDiv = document.querySelector("#loginStatus");
    const submitBtn = form.querySelector("button[type='submit']");
    const params = new URLSearchParams(location.search);
    const preselect = params.get("type");
    const supabaseConfig = window.STAY_SUPABASE || {};
    
    const supabaseClient = supabaseConfig.url && supabaseConfig.anonKey && window.supabase
      ? window.supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey, {
          auth: { storageKey: "stay-admin-auth" }
        })
      : null;

    // Prefill account type radio button based on URL param
    if (preselect === "admin" || preselect === "owner") {
      form.elements.accountType.value = preselect;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!supabaseClient) {
        statusDiv.textContent = "Connection is not ready.";
        statusDiv.classList.remove("hidden");
        return;
      }
      statusDiv.classList.add("hidden");
      submitBtn.disabled = true;
      submitBtn.textContent = "Signing In...";

      const email = form.elements.loginEmail.value.trim();
      const password = form.elements.loginPassword.value;
      const selectedType = form.elements.accountType.value;

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;

        const user = data.user;
        
        // Fetch user role from profiles
        const { data: profile } = await supabaseClient
          .from("profiles")
          .select("role")
          .eq("id", user.id)
          .single();

        let resolvedRole = profile?.role;
        
        if (!resolvedRole) {
          const { data: ownerRecord } = await supabaseClient
            .from("hotel_owners")
            .select("id")
            .eq("id", user.id)
            .single();
          if (ownerRecord) {
            resolvedRole = "owner";
          }
        }

        // ponytail: fallback check if profile role is not populated but email matches default admin
        if (!resolvedRole && email === "admin@staymaredumilli.com") {
          resolvedRole = "admin";
        }

        if (selectedType === "admin") {
          if (resolvedRole !== "admin") {
            await supabaseClient.auth.signOut();
            throw new Error("Access denied: You are not registered as an Admin.");
          }
          location.href = "admin.html";
        } else {
          if (resolvedRole !== "owner") {
            await supabaseClient.auth.signOut();
            throw new Error("Access denied: You are not registered as a Hotel Owner.");
          }
          location.href = "owner.html";
        }
      } catch (err) {
        statusDiv.textContent = err.message;
        statusDiv.classList.remove("hidden");
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign In";
      }
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations?.().then(registrations => {
        registrations.forEach(registration => registration.unregister());
      }).catch(() => {});
    }

    let deferredPrompt;
    const pwaInstallBtn = document.querySelector("#pwaInstallBtn");

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (pwaInstallBtn) pwaInstallBtn.style.display = 'inline-flex';
    });

    if (pwaInstallBtn) {
      pwaInstallBtn.addEventListener('click', async () => {
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS) {
          alert("To install this app on iOS:\n1. Tap the Share button in Safari (at the bottom or top of the screen).\n2. Scroll down the menu and tap 'Add to Home Screen'.");
        } else if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log("Install prompt outcome:", outcome);
          deferredPrompt = null;
          pwaInstallBtn.style.display = 'none';
        } else {
          alert("To add this app to your Home Screen, use your browser's menu (e.g. tap 'Install App' or 'Add to home screen').");
        }
      });
    }

    if (window.navigator.standalone === false || !window.matchMedia('(display-mode: standalone)').matches) {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      if (isIOS && pwaInstallBtn) {
        pwaInstallBtn.style.display = 'inline-flex';
      }
    }
  </script>
</body>
</html>
